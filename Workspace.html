    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <span id="colorBtn">+</span>
    <input type="range" id="slider" value=129 min=0 max=360 style="display: none;"></input>

    <div id="storybox" style="display: none;">
        <div class="flare"></div>
        <div class="title">WORKSPACE</div>
        <div id="story"></div>
        <div id="choices"></div>

    <script src="script.js"></script>
